<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Upload Hosts File - THL Hosts</title>
    <style>
        :root {
            --bg-color: #f2f2f7;
            --card-bg: #ffffff;
            --text-color: #000000;
            --accent-color: #007aff;
            --secondary-text: #666666;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #000000;
                --card-bg: #1c1c1e;
                --text-color: #ffffff;
                --accent-color: #0a84ff;
                --secondary-text: #8e8e93;
            }
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            transition: all 0.3s ease;
        }

        .card {
            background-color: var(--card-bg);
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            max-width: 90%;
            width: 400px;
            text-align: center;
        }

        .icon {
            font-size: 64px;
            margin-bottom: 20px;
        }

        h1 {
            font-size: 24px;
            font-weight: 700;
            margin: 0 0 10px 0;
        }

        p {
            color: var(--secondary-text);
            font-size: 16px;
            line-height: 1.5;
            margin-bottom: 30px;
        }

        .file-input-wrapper {
            position: relative;
            display: inline-block;
            width: 100%;
        }

        input[type="file"] {
            display: none;
        }

        .btn {
            background-color: var(--accent-color);
            color: #ffffff;
            padding: 16px 32px;
            border-radius: 14px;
            font-size: 18px;
            font-weight: 600;
            border: none;
            cursor: pointer;
            width: 100%;
            transition: transform 0.2s ease, opacity 0.2s ease;
        }

        .btn:active {
            transform: scale(0.98);
            opacity: 0.9;
        }

        .footer {
            margin-top: 40px;
            font-size: 14px;
            color: var(--secondary-text);
        }

        #status {
            margin-top: 20px;
            padding: 10px;
            border-radius: 8px;
            display: none;
        }

        .success { background: #34c75922; color: #34c759; display: block !important; }
        .error { background: #ff3b3022; color: #ff3b30; display: block !important; }
    </style>
</head>
<body>
    <div class="card">
        <div class="icon">📄</div>
        <h1>Upload Hosts</h1>
        <p>Select a .hosts or .txt file to upload to your THL Hosts app.</p>
        
        <form id="uploadForm" action="/upload" method="post" enctype="multipart/form-data">
            <label class="file-input-wrapper">
                <input type="file" name="file" id="fileInput" accept=".hosts,.txt">
                <button type="button" class="btn" onclick="document.getElementById('fileInput').click()">Choose File</button>
            </label>
        </form>

        <div id="status">
            <div id="statusIcon"></div>
            <div id="statusText"></div>
            <button type="button" class="btn secondary" style="margin-top: 20px; background: var(--secondary-text);" onclick="resetUpload()">Upload Another</button>
        </div>

        <div class="footer">
            糖葫芦 Hosts - Professional Redirection
        </div>
    </div>

    <script>
        const status = document.getElementById('status');
        const statusIcon = document.getElementById('statusIcon');
        const statusText = document.getElementById('statusText');
        const fileInput = document.getElementById('fileInput');
        const uploadForm = document.getElementById('uploadForm');

        function resetUpload() {
            status.style.display = 'none';
            uploadForm.style.display = 'block';
            fileInput.value = '';
        }

        fileInput.onchange = function() {
            const file = this.files[0];
            if (file) {
                const formData = new FormData();
                formData.append('file', file);
                
                uploadForm.style.display = 'none';
                status.className = 'uploading';
                statusIcon.innerText = '⏳';
                statusText.innerText = 'Uploading...';
                status.style.display = 'block';

                fetch('/upload', {
                    method: 'POST',
                    body: formData
                })
                .then(response => {
                    if (!response.ok) throw new Error('Server returned ' + response.status);
                    return response.text();
                })
                .then(data => {
                    status.className = 'success';
                    statusIcon.innerText = '✅';
                    statusText.innerText = 'Upload Successful!';
                })
                .catch(error => {
                    status.className = 'error';
                    statusIcon.innerText = '❌';
                    statusText.innerText = 'Upload Failed: ' + error.message;
                });
            }
        };
    </script>
</body>
</html>
